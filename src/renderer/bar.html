<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: transparent;
        overflow: visible;
        user-select: none;
        -webkit-app-region: drag;
      }

      .bar {
        display: flex;
        gap: 32px;
        padding: 8px 18px;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 20px;
        position: absolute;
        bottom: 0; left: 0; right: 0;
      }

      .panel {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 155px;
        -webkit-app-region: no-drag;
      }

      .char-video {
        object-fit: contain;
        background: transparent;
      }

      .char-img, .char-video {
        width: 130px;
        height: 130px;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        -webkit-app-region: no-drag;
        cursor: pointer;
        transform-origin: bottom center;
      }


      @keyframes doWork {
        0%   { transform: translateY(0px)  rotate(0deg)    scale(1);    }
        15%  { transform: translateY(-5px) rotate(-2deg)   scale(1.03); }
        30%  { transform: translateY(-2px) rotate(1.2deg)  scale(1.01); }
        48%  { transform: translateY(-6px) rotate(-1deg)   scale(1.04); }
        64%  { transform: translateY(-1px) rotate(1.8deg)  scale(1.01); }
        80%  { transform: translateY(-4px) rotate(-0.8deg) scale(1.02); }
        100% { transform: translateY(0px)  rotate(0deg)    scale(1);    }
      }

      .panel.active .char-img,
      .panel.active .char-video {
        animation: doWork 1.4s ease-in-out infinite;
        filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45));
      }

      /* 호버 존 — 에이전트가 없을 때 마우스 진입 감지용 */
      .hover-zone {
        width: 155px;
        height: 36px;
        cursor: default;
        -webkit-app-region: no-drag;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hover-zone-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(255,255,255,0.25);
        transition: background 0.2s;
      }
      .panel.hovered .hover-zone-dot {
        background: rgba(255,255,255,0.55);
      }

      /* 바 버튼 공통 */
      .bar-btn {
        position: absolute;
        top: 6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        color: white;
        font-size: 12px;
        cursor: pointer;
        -webkit-app-region: no-drag;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s ease;
        border: none;
        z-index: 40;
      }

      .bar:hover .bar-btn { opacity: 1; }
      /* 캐릭터 팝업 카드가 열려 있는 동안엔 버튼 숨김 — 카드와 겹침 방지 */
      .bar.card-open .bar-btn { opacity: 0; pointer-events: none; }

      .settings-btn {
        right: 6px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3) !important;
      }

      .close-btn {
        right: 34px;
        background: rgba(255, 95, 87, 0.7);
        font-size: 10px;
        font-weight: 700;
      }
      .close-btn:hover { background: #ff3b30; }

      .meeting-btn {
        right: 62px;
        background: rgba(99,102,241,0.55);
        border: 1px solid rgba(99,102,241,0.5) !important;
        font-size: 13px;
      }
      .meeting-btn:hover { background: rgba(99,102,241,0.85); }

      .digest-btn {
        right: 90px;
        background: rgba(52,199,89,0.45);
        border: 1px solid rgba(52,199,89,0.45) !important;
        font-size: 12px;
      }
      .digest-btn:hover { background: rgba(52,199,89,0.75); }

      /* 호버 카드 */
      .hover-card {
        position: absolute;
        bottom: 130px;
        left: 50%;
        transform: translateX(-50%) translateY(6px);
        background: rgba(18, 18, 22, 0.90);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 14px;
        padding: 10px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        width: 150px; /* 패널 폭(155px) 이하 — 인접 카드와 겹침 방지 */
        opacity: 0;
        transition: opacity 0.18s ease, transform 0.18s ease;
        pointer-events: none;
        z-index: 20;
        -webkit-app-region: no-drag;
      }
      .hover-card.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      .chat-divider  { width: 100%; height: 1px; background: rgba(255,255,255,0.08); margin: 2px 0; }
      .chat-response {
        display: none; width: 100%;
        font-size: 11px; font-family: -apple-system, sans-serif;
        color: rgba(255,255,255,0.78); line-height: 1.55;
        word-break: keep-all; white-space: pre-wrap;
        padding: 2px 0 4px;
      }
      .voice-status {
        display: none;
        font-size: 10px; font-family: -apple-system, sans-serif;
        color: rgba(255,255,255,0.45);
      }
      .voice-status.active { display: block; }
      .mic-btn {
        width: 42px; height: 42px; border-radius: 50%;
        background: rgba(255,255,255,0.08);
        border: 1.5px solid rgba(255,255,255,0.15);
        color: white; font-size: 20px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        -webkit-app-region: no-drag;
        transition: all 0.15s;
      }
      .mic-btn:hover { background: rgba(255,255,255,0.14); }
      .mic-btn.on {
        background: rgba(255,59,48,0.28);
        border-color: rgba(255,59,48,0.65);
        box-shadow: 0 0 12px rgba(255,59,48,0.28);
      }

      .name-row { display: flex; align-items: center; gap: 6px; }

      .status-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #34c759;
        flex-shrink: 0;
        box-shadow: 0 0 5px rgba(52,199,89,0.7);
        transition: background 0.3s, box-shadow 0.3s;
      }
      .status-dot.working {
        background: #ff3b30;
        box-shadow: 0 0 6px rgba(255,59,48,0.8);
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.45; }
      }

      .hover-name  { font-size: 13px; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.95); font-weight: 700; letter-spacing: -0.3px; }
      .hover-role  { font-size: 10px; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.2px; }
      .status-label{ font-size: 10px; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.38); letter-spacing: 0.1px; }
      /* 말풍선 */
      .bubble {
        display: none;
        position: absolute;
        bottom: 230px; left: 50%;
        transform: translateX(-50%);
        width: 190px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 12px; font-family: -apple-system, sans-serif; line-height: 1.5;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        color: #333;
        z-index: 30;
        -webkit-app-region: no-drag;
        white-space: pre-wrap; word-break: keep-all;
      }
    </style>
  </head>
  <body>
    <div class="bar" id="bar">
      <button class="bar-btn digest-btn" id="digest-btn" title="Daily Digest 실행">📋</button>
      <button class="bar-btn meeting-btn" id="meeting-btn" title="Meeting">💬</button>
      <button class="bar-btn close-btn"   id="close-btn"   title="닫기">✕</button>
      <button class="bar-btn settings-btn" id="settings-btn" title="설정">⚙</button>
    </div>

    <script>
      const AGENTS = [
        { id: "fox_news_anchor",       name: "Foxy",  role: "News Anchor · Market Intelligence", imagePath: "../../assets/images/foxy_developer-removebg-preview.png",  videoPath: "../../assets/images/foxy_video.mp4" },
        { id: "cat_idea_planner",      name: "Kitty", role: "Idea Planner · Tech Strategist",    imagePath: "../../assets/images/kitty_marketer-removebg-preview.png", videoPath: "../../assets/images/kitty_video.mp4" },
        { id: "rabbit_budget_analyst", name: "Bunny", role: "Budget Analyst · Cost Strategy",    imagePath: "../../assets/images/rabbit_accountant-removebg-preview.png", videoPath: "../../assets/images/rabbit_video.mp4" },
      ];

      const panels = {};
      const bar = document.getElementById("bar");
      let currentGreetAudio = null; // 전역 인사 오디오 — 에이전트 간 겹침 방지

      for (const agent of AGENTS) {
        const panel    = document.createElement("div"); panel.className = "panel";
        const bubble   = document.createElement("div"); bubble.className = "bubble";
        const imgEl    = document.createElement("img");     imgEl.className = "char-img"; imgEl.style.display = "none";
        const canvasEl = document.createElement("canvas"); canvasEl.className = "char-video"; canvasEl.width = 130; canvasEl.height = 130; canvasEl.style.display = "none";
        const videoEl  = document.createElement("video");  videoEl.muted = true; videoEl.playsInline = true; videoEl.style.display = "none";

        // 호버 카드
        const hoverCard   = document.createElement("div"); hoverCard.className = "hover-card";
        const nameRow     = document.createElement("div"); nameRow.className = "name-row";
        const statusDot   = document.createElement("div"); statusDot.className = "status-dot";
        const nameEl      = document.createElement("div"); nameEl.className = "hover-name"; nameEl.textContent = agent.name;
        nameRow.append(statusDot, nameEl);
        const roleEl      = document.createElement("div"); roleEl.className = "hover-role"; roleEl.textContent = agent.role;
        const statusLabel = document.createElement("div"); statusLabel.className = "status-label"; statusLabel.textContent = "● Idle";

        // 1대1 음성 대화
        const chatDivider  = document.createElement("div");    chatDivider.className = "chat-divider";
        const chatResponse = document.createElement("div");    chatResponse.className = "chat-response";
        const voiceStatus  = document.createElement("div");    voiceStatus.className = "voice-status";
        const micBtn       = document.createElement("button"); micBtn.className = "mic-btn"; micBtn.textContent = "🎙️";

        hoverCard.append(nameRow, roleEl, statusLabel, chatDivider, chatResponse, voiceStatus, micBtn);

        const hoverZone = document.createElement("div"); hoverZone.className = "hover-zone";
        const hoverDot  = document.createElement("div"); hoverDot.className = "hover-zone-dot";
        hoverZone.appendChild(hoverDot);

        panel.append(bubble, hoverCard, imgEl, canvasEl, hoverZone);
        bar.appendChild(panel);

        // 마우스 위치로 hover 토글 + 인사 재생
        // pinned: 글로벌 단축키로 연 음성 모드 — 마우스가 벗어나도 카드 유지
        let wasInside = false;
        let pinned = false;
        document.addEventListener("mousemove", ((p, hc, id) => (e) => {
          const pr = p.getBoundingClientRect();
          const cr = hc.getBoundingClientRect();

          // 패널 전체 + 호버 카드 통합 영역
          const inside =
            e.clientX >= Math.min(pr.left, cr.left) &&
            e.clientX <= Math.max(pr.right, cr.right) &&
            e.clientY >= Math.min(pr.top, cr.top) &&
            e.clientY <= Math.max(pr.bottom, cr.bottom);

          const entering = inside && !wasInside;
          const leaving  = !inside && wasInside;

          p.classList.toggle("hovered", inside || pinned);
          hc.classList.toggle("visible", inside || pinned);
          bar.classList.toggle("card-open", !!document.querySelector(".hover-card.visible"));

          if (leaving && !pinned) {
            if (currentGreetAudio) { currentGreetAudio.pause(); currentGreetAudio.currentTime = 0; currentGreetAudio = null; }
            stopVoice();
          }
          wasInside = inside;
        })(panel, hoverCard, agent.id));

        function setWorking(isWorking) {
          statusDot.classList.toggle("working", isWorking);
          statusLabel.textContent = isWorking ? "● Working..." : "● Idle";
        }

        // ── VAD 음성 대화 ──────────────────────────────────
        const SILENCE_THRESHOLD = 0.012;
        const SILENCE_MS        = 1500;
        const MIN_RECORD_MS     = 400;

        let liveMode = false, micStream = null, audioCtx = null, analyserNode = null;
        let vadBuf = null, recorder = null, micChunks = [], isCapturing = false;
        let lastSpeech = 0, captureStart = 0, vadRafId = null, voiceBusy = false;
        // 대화 히스토리는 메인 프로세스가 영속 관리 (memory/conversations.json)

        const setVoiceStatus = (text) => {
          voiceStatus.textContent = text;
          voiceStatus.classList.toggle('active', !!text);
        };

        const getRMS = () => {
          if (!analyserNode || !vadBuf) return 0;
          analyserNode.getByteTimeDomainData(vadBuf);
          let sum = 0;
          for (let i = 0; i < vadBuf.length; i++) { const v = (vadBuf[i]-128)/128; sum += v*v; }
          return Math.sqrt(sum / vadBuf.length);
        };

        const stopVoice = () => {
          if (vadRafId) { cancelAnimationFrame(vadRafId); vadRafId = null; }
          if (recorder && recorder.state === 'recording') recorder.stop();
          micStream?.getTracks().forEach(t => t.stop());
          audioCtx?.close();
          audioCtx = null; analyserNode = null; micStream = null; vadBuf = null;
          recorder = null; isCapturing = false; liveMode = false; voiceBusy = false;
          pinned = false;
          micBtn.classList.remove('on'); micBtn.textContent = '🎙️';
          setVoiceStatus('');
        };

        const startCapture = () => {
          if (!micStream || isCapturing) return;
          const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
          recorder = new MediaRecorder(micStream, { mimeType });
          micChunks = []; captureStart = Date.now();
          recorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };
          recorder.onstop = processVoice;
          recorder.start(); isCapturing = true;
          setVoiceStatus('🔴 Recording...');
        };

        const stopCapture = () => {
          if (!isCapturing || !recorder || recorder.state !== 'recording') return;
          isCapturing = false; recorder.stop();
        };

        const vadLoop = () => {
          if (!liveMode) return;
          const rms = getRMS(), now = Date.now();
          if (rms > SILENCE_THRESHOLD) {
            lastSpeech = now;
            if (!isCapturing && !voiceBusy) startCapture();
          } else if (isCapturing && (now - lastSpeech) >= SILENCE_MS) {
            stopCapture(); return;
          }
          vadRafId = requestAnimationFrame(vadLoop);
        };

        const processVoice = async () => {
          if ((Date.now() - captureStart) < MIN_RECORD_MS || micChunks.length === 0) {
            if (liveMode) { setVoiceStatus('👂 Listening...'); vadRafId = requestAnimationFrame(vadLoop); }
            return;
          }
          setVoiceStatus('⏳ Thinking...');
          voiceBusy = true;
          const blob = new Blob(micChunks, { type: recorder?.mimeType || 'audio/webm' });
          const bytes = new Uint8Array(await blob.arrayBuffer());
          let binary = '';
          for (let i = 0; i < bytes.length; i += 8192)
            binary += String.fromCharCode(...bytes.subarray(i, i + 8192));
          try {
            const text = await window.agent.transcribeAudio(btoa(binary));
            if (text.trim()) {
              setWorking(true);
              chatResponse.style.display = 'block'; chatResponse.textContent = '...';
              const result = await window.agent.meetingMessage(agent.id, text.trim());
              chatResponse.textContent = result.text || '';
              setWorking(false);
              if (result.audioPath) {
                setVoiceStatus('🔊 Speaking...');
                showVideo();
                const audio = new Audio(result.audioPath);
                await new Promise(r => { audio.onended = () => { showImage(); r(); }; audio.onerror = r; audio.play().catch(r); });
              }
            }
          } catch { chatResponse.style.display = 'block'; chatResponse.textContent = '⚠ Error'; setWorking(false); }
          voiceBusy = false;
          if (liveMode) { setVoiceStatus('👂 Listening...'); lastSpeech = 0; vadRafId = requestAnimationFrame(vadLoop); }
        };

        const startVoice = async () => {
          try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            audioCtx = new AudioContext();
            analyserNode = audioCtx.createAnalyser(); analyserNode.fftSize = 512;
            vadBuf = new Uint8Array(analyserNode.frequencyBinCount);
            audioCtx.createMediaStreamSource(micStream).connect(analyserNode);
            liveMode = true;
            micBtn.classList.add('on'); micBtn.textContent = '🔴';
            setVoiceStatus('👂 Listening...');
            vadLoop();
          } catch { setVoiceStatus('Mic denied'); setTimeout(() => setVoiceStatus(''), 2000); }
        };

        micBtn.addEventListener('click', () => { if (liveMode) stopVoice(); else startVoice(); });

        imgEl.src = agent.imagePath;
        imgEl.onload = () => { imgEl.style.display = "block"; };

        if (agent.videoPath) { videoEl.src = agent.videoPath; }

        const ctx = canvasEl.getContext('2d');
        let rafId = null;

        const drawFrame = () => {
          if (videoEl.paused || videoEl.ended) return;
          ctx.drawImage(videoEl, 0, 0, 130, 130);
          const frame = ctx.getImageData(0, 0, 130, 130);
          const d = frame.data;
          for (let i = 0; i < d.length; i += 4) {
            if (d[i] + d[i+1] + d[i+2] < 60) d[i+3] = 0;
          }
          ctx.putImageData(frame, 0, 0);
          rafId = requestAnimationFrame(drawFrame);
        };

        const showVideo = () => {
          if (!agent.videoPath) return;
          imgEl.style.display = "none";
          canvasEl.style.display = "block";
          videoEl.currentTime = 0;
          videoEl.play().catch(() => {});
          drawFrame();
        };
        const showImage = () => {
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
          canvasEl.style.display = "none";
          imgEl.style.display = "block";
        };
        videoEl.onended = showImage;

        // 글로벌 단축키(⌘⇧Space) → 음성 모드 토글 + 카드 고정
        const toggleVoice = () => {
          if (liveMode) {
            pinned = false;
            stopVoice();
            hoverCard.classList.remove("visible");
            panel.classList.remove("hovered");
            bar.classList.toggle("card-open", !!document.querySelector(".hover-card.visible"));
          } else {
            pinned = true;
            hoverCard.classList.add("visible");
            panel.classList.add("hovered");
            bar.classList.add("card-open");
            startVoice();
          }
        };

        panels[agent.id] = { bubble, setWorking, showVideo, showImage, toggleVoice };
      }

      // 브리핑 수신
      window.agent.onBriefing(({ agentId, text, audioPath }) => {
        const p = panels[agentId];
        if (!p) return;

        p.setWorking(true);
        p.showVideo();
        p.bubble.textContent = text;
        p.bubble.style.display = "block";

        const audio = new Audio(audioPath);
        audio.play();
        audio.onended = () => {
          p.showImage();
          p.setWorking(false);
          setTimeout(() => { p.bubble.style.display = "none"; }, 2000);
        };
      });

      // 글로벌 단축키 수신 (⌘⇧Space → Foxy 음성 대화 토글)
      window.agent.onToggleVoice((agentId) => panels[agentId]?.toggleVoice?.());

      document.getElementById("meeting-btn").addEventListener("click", () => window.agent.openMeeting());
      document.getElementById("digest-btn").addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        if (btn.dataset.busy) return;
        btn.dataset.busy = "1";
        btn.textContent = "⏳";
        try { await window.agent.runDigest(); }
        finally { delete btn.dataset.busy; btn.textContent = "📋"; }
      });
      document.getElementById("settings-btn").addEventListener("click", () => window.agent.openSettings());
      document.getElementById("close-btn").addEventListener("click", () => window.agent.closeApp());
    </script>
  </body>
</html>
